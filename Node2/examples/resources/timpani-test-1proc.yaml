apiVersion: v1
kind: Schedule
metadata:
  name: perf_1proc_tc1
spec:
  - name: p1_0
    priority: 20
    policy: FIFO
    cpu_affinity: 3        # bitmask: CPUs [0,1] -> binary 0b11 = 3 (2 CPUs)
    period: 10000
    release_time: 0
    runtime: 9000         # declared WCET per thread; scheduler accepts (90% util) and pins to 2 CPUs
    deadline: 10000
    node_id: perf_node
    max_dmiss: 3
---
apiVersion: v1
kind: Scenario
metadata:
  name: timpani_test
spec:
  condition: null
  action: launch
  target: timpani_test
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: timpani_test
spec:
  schedule: perf_1proc_tc1
  pattern:
    - type: plain
  models:
    - name: test_model1
      node: lg-NUC11TNHi5
      resources:
        volume:
        network:
---
apiVersion: v1
kind: Model
metadata:
  name: test_model1
  annotations:
    io.piccolo.annotations.package-type: timpani_test
    io.piccolo.annotations.package-name: timpani_test
    io.piccolo.annotations.package-network: default
  labels:
    app: test_model1
spec:
  hostNetwork: true
  containers:
    - name: p1_0
      image: ghcr.io/mco-piccolo/timpani_test:latest
      command: ["./sample_apps", "-a", "3", "-l", "70000", "p1_0"]  # 3 threads x ~7ms; 2 CPUs -> ~14ms > 10ms = MISS | 4 CPUs -> ~7ms < 10ms = NO MISS
      securityContext:
        capabilities:
          add: ["SYS_NICE"]
      resources:
        limits:
          cpu: "4"   # no cgroup throttle; miss is caused solely by cpu_affinity:3 pinning to 2 CPUs
  terminationGracePeriodSeconds: 0
  restartPolicy: Never
