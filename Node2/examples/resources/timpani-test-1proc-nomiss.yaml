#
# NO-MISS CASE: safety_node with available_cpus: [0,1,2,3]
# Changes from timpani-test-1proc.yaml (miss case):
#   1. cpu_affinity: 3  -> 15   (bitmask: CPUs [0,1,2,3] -> binary 0b1111 = 15)
#   2. node_id: perf_node -> safety_node
#   3. runtime: 11000 -> 9000   (9ms work < 10ms period)
#   4. resources.limits.cpu: "2" -> "4"   (4 CPUs available on safety_node)
# Result: 9ms work < 10ms period -> no deadline miss
# apiVersion: v1
# kind: Schedule
# metadata:
#   name: perf_1proc_tc1
# spec:
#   - name: p1_0
#     priority: 20
#     policy: FIFO
#     cpu_affinity: 3      # bitmask: CPUs [0,1,2,3] -> binary 0b1111 = 15 (perf_node)
#     period: 10000
#     release_time: 0
#     runtime: 3000
#     deadline: 9000
#     node_id: perf_node
#     max_dmiss: 3
# ---
# apiVersion: v1
# kind: Scenario
# metadata:
#   name: timpani_test
# spec:
#   condition: null
#   action: update
#   target: timpani_test
# ---
# apiVersion: v1
# kind: Package
# metadata:
#   label: null
#   name: timpani_test
# spec:
#   schedule: perf_1proc_tc1
#   pattern:
#     - type: plain
#   models:
#     - name: test_model1
#       node: lg-NUC11TNHi5
#       resources:
#         volume:
#         network:
# ---
# apiVersion: v1
# kind: Model
# metadata:
#   name: test_model1
#   annotations:
#     io.piccolo.annotations.package-type: timpani_test
#     io.piccolo.annotations.package-name: timpani_test
#     io.piccolo.annotations.package-network: default
#   labels:
#     app: test_model1
# spec:
#   hostNetwork: true
#   containers:
#     - name: p1_0
#       image: ghcr.io/mco-piccolo/timpani_test:latest
#       command: ["./sample_apps", "-a", "3", "-l", "11000", "p1_0"]   # 9ms work < 10ms period = NO MISS
#       securityContext:
#         capabilities:
#           add: ["SYS_NICE"]
#       resources:
#         limits:
#           cpu: "4"   # safety_node: 4 CPUs available [0,1,2,3]
#   terminationGracePeriodSeconds: 0
#   restartPolicy: Never
# SPDX-FileCopyrightText: Copyright 2024 LG Electronics Inc.
# SPDX-License-Identifier: Apache-2.0
---
apiVersion: v1
kind: Schedule
metadata:
  name: perf_1proc_tc1
spec:
  - name: p1_0
    priority: 20
    policy: FIFO
    cpu_affinity: 15     # bitmask 0b1111 = CPUs [0,1,2,3] -> 4 cores -> no miss
    period: 10000
    release_time: 0
    runtime: 9000
    deadline: 10000
    node_id: perf_node
    max_dmiss: 3
---
apiVersion: v1
kind: Scenario
metadata:
  name: timpani_test
spec:
  condition: null
  action: reschedule
  target: timpani_test
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: timpani_test
spec:
  schedule: perf_1proc_tc1
  pattern:
    - type: plain
  models:
    - name: test_model1
      node: lg-NUC11TNHi5
      resources:
        volume:
        network: